# Site configuration
title: PhD Thesis Supplementary Materials
description: Comprehensive documentation, scripts, and data for thesis chapters
author: Your Name
email: your.email@institution.ac.nz

# GitHub Pages settings
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Minimal theme customization
theme_color: "#222222"
logo: /assets/images/logo.png

# Navigation
header_pages:
  - index.md
  - chapters.md
  - about.md

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Custom settings for dark theme
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
